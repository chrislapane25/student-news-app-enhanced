<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student News Hub - Stay Informed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --primary-light: #3b82f6;
            --accent: #f59e0b;
            --bg-light: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        body.dark-mode {
            --bg-light: #1a1f36;
            --card-bg: #252d44;
            --text-dark: #e2e8f0;
            --text-light: #a0aec0;
            --border: #3f4d66;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            color: var(--text-dark);
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1a1f36 0%, #161b2e 100%);
        }

        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 2rem 0;
            box-shadow: var(--shadow-lg);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            color: white;
        }

        .logo-icon {
            font-size: 2rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .search-container {
            flex: 1;
            max-width: 500px;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 1.25rem;
            border: none;
            border-radius: 50px;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.95);
            color: var(--text-dark);
        }

        .search-input:focus {
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3);
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn-icon {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.25rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-label {
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.9rem;
        }

        .category-btn {
            padding: 0.6rem 1.25rem;
            border: 2px solid var(--border);
            background: var(--card-bg);
            color: var(--text-dark);
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .category-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .category-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .status-message {
            padding: 1.5rem;
            border-radius: 0.75rem;
            margin-bottom: 2rem;
            display: none;
        }

        .status-message.show {
            display: block;
        }

        .status-message.error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .status-message.success {
            background: #dcfce7;
            color: #166534;
            border-left: 4px solid #10b981;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .news-card {
            background: var(--card-bg);
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .news-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }

        .card-image-wrapper {
            position: relative;
            overflow: hidden;
            height: 200px;
            background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-category {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--accent);
            color: white;
            padding: 0.4rem 0.9rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .card-body {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .card-source {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 0.5rem;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.75rem;
        }

        .card-description {
            font-size: 0.95rem;
            color: var(--text-light);
            margin-bottom: 1rem;
            flex: 1;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }

        .card-date {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .card-actions {
            display: flex;
            gap: 0.75rem;
        }

        .btn-action {
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-action:hover {
            color: var(--primary);
            transform: scale(1.2);
        }

        .btn-action.favorite {
            color: #ef4444;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-light);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        footer {
            background: #0f172a;
            color: #cbd5e1;
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 1rem;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 2rem;
            width: 90%;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h2 {
            font-size: 1.5rem;
            color: var(--text-dark);
        }

        .btn-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
        }

        .modal-body {
            color: var(--text-light);
            line-height: 1.8;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.6rem 1.25rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--border);
            color: var(--text-dark);
            border: none;
            padding: 0.6rem 1.25rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
        }

        .email-input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--border);
            border-radius: 0.5rem;
            font-size: 0.95rem;
            background: var(--card-bg);
            color: var(--text-dark);
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .search-container {
                max-width: none;
            }

            .container {
                padding: 1rem;
            }

            .news-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="#" class="logo">
                <span class="logo-icon">📰</span>
                <span>Student News Hub</span>
            </a>
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="Search news stories..." autocomplete="off">
            </div>
            <div class="header-actions">
                <button class="btn-icon" id="alertBtn" title="Set email alerts">🔔</button>
                <button class="btn-icon" id="favoritesBtn" title="View favorites">⭐</button>
                <button class="btn-icon" id="darkModeBtn" title="Toggle dark mode">🌙</button>
                <button class="btn-icon" id="refreshBtn" title="Refresh news">🔄</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="status-message" id="statusMessage"></div>

        <div class="filters">
            <span class="filter-label">Category:</span>
            <div style="display: flex; gap: 0.75rem; flex-wrap: wrap;">
                <button class="category-btn active" data-category="general">All News</button>
                <button class="category-btn" data-category="business">💼 Business</button>
                <button class="category-btn" data-category="technology">💻 Technology</button>
                <button class="category-btn" data-category="entertainment">🎬 Entertainment</button>
                <button class="category-btn" data-category="politics">🏛️ Politics</button>
                <button class="category-btn" data-category="science">🔬 Science</button>
                <button class="category-btn" data-category="sports">⚽ Sports</button>
                <button class="category-btn" data-category="health">💊 Health</button>
            </div>
        </div>

        <div class="news-grid" id="newsGrid"></div>
    </div>

    <footer>
        <p>📰 Student News Hub — Keep up with global news • <a href="https://newsapi.org/" style="color: #3b82f6; text-decoration: none;">Powered by NewsAPI</a></p>
        <p style="font-size: 0.9rem; margin-top: 1rem;">For accounting and business students staying informed</p>
    </footer>

    <!-- Article Modal -->
    <div class="modal" id="articleModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Article Details</h2>
                <button class="btn-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-actions">
                <button class="btn-primary" id="exportPdfBtn">📄 Export as PDF</button>
                <button class="btn-secondary" id="closeModalBtn">Close</button>
            </div>
        </div>
    </div>

    <!-- Email Alert Modal -->
    <div class="modal" id="alertModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🔔 Email Alerts Setup</h2>
                <button class="btn-close" id="closeAlertModal">&times;</button>
            </div>
            <div class="modal-body">
                <p>Get email alerts for breaking news in your favorite categories.</p>
                <input type="email" class="email-input" id="emailInput" placeholder="Enter your email address">
                <p style="font-size: 0.85rem; margin-bottom: 1rem;">Select categories for alerts:</p>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem;">
                    <label><input type="checkbox" class="alert-category" value="business"> Business</label>
                    <label><input type="checkbox" class="alert-category" value="technology"> Technology</label>
                    <label><input type="checkbox" class="alert-category" value="entertainment"> Entertainment</label>
                    <label><input type="checkbox" class="alert-category" value="politics"> Politics</label>
                    <label><input type="checkbox" class="alert-category" value="science"> Science</label>
                    <label><input type="checkbox" class="alert-category" value="sports"> Sports</label>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-primary" id="saveAlertBtn">Save Alert Settings</button>
                <button class="btn-secondary" id="closeAlertModalBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const state = {
            currentCategory: 'general',
            articles: [],
            favorites: JSON.parse(localStorage.getItem('favorites')) || [],
            darkMode: localStorage.getItem('darkMode') === 'true',
            alertEmail: localStorage.getItem('alertEmail') || '',
            alertCategories: JSON.parse(localStorage.getItem('alertCategories')) || [],
            isLoading: false,
            searchQuery: '',
            currentArticle: null
        };

        const newsGrid = document.getElementById('newsGrid');
        const statusMessage = document.getElementById('statusMessage');
        const searchInput = document.getElementById('searchInput');
        const favoritesBtn = document.getElementById('favoritesBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const darkModeBtn = document.getElementById('darkModeBtn');
        const alertBtn = document.getElementById('alertBtn');
        const categoryBtns = document.querySelectorAll('.category-btn');
        const articleModal = document.getElementById('articleModal');
        const alertModal = document.getElementById('alertModal');
        const closeModal = document.getElementById('closeModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const closeAlertModal = document.getElementById('closeAlertModal');
        const closeAlertModalBtn = document.getElementById('closeAlertModalBtn');
        const modalBody = document.getElementById('modalBody');
        const exportPdfBtn = document.getElementById('exportPdfBtn');
        const saveAlertBtn = document.getElementById('saveAlertBtn');
        const emailInput = document.getElementById('emailInput');
        const alertCategoryInputs = document.querySelectorAll('.alert-category');

        if (state.darkMode) {
            document.body.classList.add('dark-mode');
        }

        function showStatus(message, type = 'info') {
            statusMessage.textContent = message;
            statusMessage.className = `status-message show ${type}`;
            setTimeout(() => statusMessage.classList.remove('show'), 3500);
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 1) return 'just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;
            
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        async function fetchNews(category = 'general', searchQuery = '') {
            state.isLoading = true;
            showStatus('Loading news...', 'info');

            try {
                let url = `/api/news`;
                
                if (searchQuery) {
                    url = `/api/news/search?q=${encodeURIComponent(searchQuery)}&limit=30`;
                } else if (category !== 'general') {
                    url = `/api/news/category/${category}?limit=20`;
                } else {
                    url = `/api/news?limit=20`;
                }

                const response = await fetch(url);
                const data = await response.json();

                if (data.status === 'error') {
                    showStatus(`Error: ${data.message}`, 'error');
                    state.articles = [];
                } else {
                    state.articles = data.news || [];
                    showStatus(`Found ${data.count} articles`, 'success');
                }

                renderNews();
            } catch (error) {
                showStatus(`Failed to load news: ${error.message}`, 'error');
                state.articles = [];
                renderNews();
            } finally {
                state.isLoading = false;
            }
        }

        function renderNews() {
            if (state.articles.length === 0) {
                newsGrid.innerHTML = `<div style="grid-column: 1/-1;"><div class="empty-state"><div class="empty-state-icon">📭</div><h3>No articles found</h3><p>Try adjusting your filters or search terms</p></div></div>`;
                return;
            }

            newsGrid.innerHTML = state.articles.map(article => {
                const isFavorite = state.favorites.some(fav => fav.url === article.url);
                
                return `
                    <div class="news-card">
                        ${article.image ? `<div class="card-image-wrapper"><img src="${article.image}" alt="${article.title}" class="card-image" onerror="this.style.display='none'"><span class="card-category">${article.category || 'News'}</span></div>` : ''}
                        <div class="card-body">
                            <div class="card-source">${article.source || 'Unknown Source'}</div>
                            <h3 class="card-title">${article.title}</h3>
                            <p class="card-description">${article.description || 'No description available'}</p>
                            <div class="card-footer">
                                <span class="card-date">${formatDate(article.published_at)}</span>
                                <div class="card-actions">
                                    <button class="btn-action favorite ${isFavorite ? 'favorite' : ''}" data-url="${article.url}" title="${isFavorite ? 'Remove from favorites' : 'Add to favorites'}">
                                        ${isFavorite ? '⭐' : '☆'}
                                    </button>
                                    <button class="btn-action" data-url="${article.url}" data-title="${article.title}" title="Read full article">
                                        →
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            attachEventListeners();
        }

        function attachEventListeners() {
            document.querySelectorAll('.btn-action.favorite').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleFavorite(btn);
                });
            });

            document.querySelectorAll('.btn-action:not(.favorite)').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const url = btn.dataset.url;
                    const title = btn.dataset.title;
                    const article = state.articles.find(a => a.url === url);
                    openArticle(url, title, article);
                });
            });

            document.querySelectorAll('.news-card').forEach(card => {
                card.addEventListener('click', () => {
                    const btn = card.querySelector('.btn-action:not(.favorite)');
                    if (btn) btn.click();
                });
            });
        }

        function toggleFavorite(btn) {
            const url = btn.dataset.url;
            const article = state.articles.find(a => a.url === url);

            if (state.favorites.some(fav => fav.url === url)) {
                state.favorites = state.favorites.filter(fav => fav.url !== url);
                btn.textContent = '☆';
                btn.classList.remove('favorite');
                showStatus('Removed from favorites', 'success');
            } else {
                if (article) state.favorites.push(article);
                btn.textContent = '⭐';
                btn.classList.add('favorite');
                showStatus('Added to favorites', 'success');
            }

            localStorage.setItem('favorites', JSON.stringify(state.favorites));
        }

        function openArticle(url, title, article) {
            state.currentArticle = article;
            modalBody.innerHTML = `
                <h3 style="margin-bottom: 1rem; color: var(--text-dark);">${title}</h3>
                <p><strong>Source:</strong> ${article?.source || 'Unknown'}</p>
                <p><strong>Published:</strong> ${formatDate(article?.published_at || '')}</p>
                ${article?.description ? `<p style="margin-top: 1rem;">${article.description}</p>` : ''}
                <p style="margin-top: 1.5rem;">
                    <a href="${url}" target="_blank" rel="noopener noreferrer" style="color: var(--primary); font-weight: 600; text-decoration: none;">
                       Read full article →
                    </a>
                </p>
            `;
            articleModal.classList.add('show');
        }

        function exportToPdf() {
            if (!state.currentArticle) return;
            
            const element = document.createElement('div');
            element.innerHTML = `
                <h1>${state.currentArticle.title}</h1>
                <p><strong>Source:</strong> ${state.currentArticle.source}</p>
                <p><strong>Published:</strong> ${state.currentArticle.published_at}</p>
                <p>${state.currentArticle.description}</p>
            `;

            const opt = {
                margin: 10,
                filename: `${state.currentArticle.title.substring(0, 30)}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };

            html2pdf().set(opt).from(element).save();
            showStatus('PDF exported successfully!', 'success');
        }

        darkModeBtn.addEventListener('click', () => {
            state.darkMode = !state.darkMode;
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', state.darkMode);
            showStatus(`Dark mode ${state.darkMode ? 'enabled' : 'disabled'}`, 'success');
        });

        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.currentCategory = btn.dataset.category;
                searchInput.value = '';
                state.searchQuery = '';
                fetchNews(state.currentCategory, '');
            });
        });

        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            state.searchQuery = query;

            if (query.length < 2) {
                if (query.length === 0) categoryBtns[0].click();
                return;
            }

            categoryBtns.forEach(b => b.classList.remove('active'));
            
            searchTimeout = setTimeout(() => {
                fetchNews('general', query);
            }, 300);
        });

        favoritesBtn.addEventListener('click', () => {
            if (state.favorites.length === 0) {
                showStatus('No favorites yet. Add some by clicking ☆!', 'info');
                return;
            }

            state.articles = state.favorites;
            categoryBtns.forEach(b => b.classList.remove('active'));
            renderNews();
            showStatus(`Showing ${state.favorites.length} favorite(s)`, 'success');
        });

        refreshBtn.addEventListener('click', () => {
            fetchNews(state.currentCategory, state.searchQuery);
        });

        alertBtn.addEventListener('click', () => {
            emailInput.value = state.alertEmail;
            alertCategoryInputs.forEach(input => {
                input.checked = state.alertCategories.includes(input.value);
            });
            alertModal.classList.add('show');
        });

        saveAlertBtn.addEventListener('click', () => {
            const email = emailInput.value.trim();
            if (!email || !email.includes('@')) {
                showStatus('Please enter a valid email address', 'error');
                return;
            }

            state.alertEmail = email;
            state.alertCategories = Array.from(alertCategoryInputs)
                .filter(input => input.checked)
                .map(input => input.value);

            localStorage.setItem('alertEmail', email);
            localStorage.setItem('alertCategories', JSON.stringify(state.alertCategories));

            showStatus('Email alert settings saved!', 'success');
            alertModal.classList.remove('show');
        });

        closeModal.addEventListener('click', () => articleModal.classList.remove('show'));
        closeModalBtn.addEventListener('click', () => articleModal.classList.remove('show'));
        closeAlertModal.addEventListener('click', () => alertModal.classList.remove('show'));
        closeAlertModalBtn.addEventListener('click', () => alertModal.classList.remove('show'));
        articleModal.addEventListener('click', (e) => {
            if (e.target === articleModal) articleModal.classList.remove('show');
        });
        alertModal.addEventListener('click', (e) => {
            if (e.target === alertModal) alertModal.classList.remove('show');
        });

        exportPdfBtn.addEventListener('click', exportToPdf);

        fetchNews('general', '');
    </script>
</body>
</html>
